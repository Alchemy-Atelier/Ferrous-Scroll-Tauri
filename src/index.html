<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ferrous Scroll - 记录卷轴</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Serif+SC:wght@300;400;500;600;700&family=ZCOOL+KuaiLe&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <div class="header-content">
                <div class="header-title">
                    <h1><i class="fas fa-scroll"></i> Ferrous Scroll</h1>
                    <p class="subtitle">记录卷轴</p>
                </div>
                <button class="settings-icon-btn" onclick="todoApp.toggleSettingsMenu()" title="设置">
                    <i class="fas fa-cog"></i>
                </button>
            </div>
            
            <!-- 集成在header中的标签页导航 -->
            <div class="page-tabs">
                <button class="tab-btn active" onclick="todoApp.switchPage('main')">
                    <i class="fas fa-scroll"></i> 任务卷轴
                </button>
                <button class="tab-btn" onclick="todoApp.switchPage('tags')">
                    <i class="fas fa-tags"></i> 标签管理
                </button>
                <button class="tab-btn" onclick="todoApp.switchPage('categories')">
                    <i class="fas fa-folder"></i> 分类管理
                </button>
                <button class="tab-btn" onclick="todoApp.switchPage('export')">
                    <i class="fas fa-download"></i> 导出选项
                </button>
            </div>
            
            <!-- 设置下拉菜单 -->
            <div id="settings-dropdown" class="settings-dropdown" style="display: none;">
                <div class="settings-dropdown-content">
                    <h3><i class="fas fa-cog"></i> 应用设置</h3>
                    
                    <!-- 任务设置 -->
                    <div class="setting-group">
                        <label>
                            <input type="checkbox" id="show-completed-toggle-menu" checked>
                            <span>显示已完成任务</span>
                        </label>
                    </div>
                    
                    <div class="setting-group">
                        <label for="default-priority-select-menu">默认优先级</label>
                        <select id="default-priority-select-menu" class="setting-select">
                            <option value="Low">低</option>
                            <option value="Medium">中</option>
                            <option value="High">高</option>
                        </select>
                    </div>
                    
                    <div class="settings-dropdown-actions">
                        <button class="settings-save-btn" onclick="todoApp.saveSettingsFromMenu()">
                            <i class="fas fa-save"></i> 保存
                        </button>
                        <button class="settings-reset-btn" onclick="todoApp.resetSettings()">
                            <i class="fas fa-undo"></i> 恢复默认
                        </button>
                    </div>
                </div>
            </div>
        </header>

        <!-- 主页面 - 任务列表 -->
        <div id="page-main" class="scroll-page active">
            <!-- 添加新记录 -->
            <div class="add-panel">
                <form id="todo-form">
                    <div class="form-row">
                        <input type="text" id="new-todo" placeholder="输入待办事项..." required>
                        <select id="priority-select" class="priority-select">
                            <option value="Low">低优先级</option>
                            <option value="Medium" selected>中优先级</option>
                            <option value="High">高优先级</option>
                        </select>
                    </div>
                    <div class="form-row">
                        <input type="text" id="description" placeholder="描述（可选）">
                        <input type="date" id="due-date" class="date-input">
                    </div>
                    <div class="form-row">
                        <div id="selected-tags" class="selected-tags"></div>
                        <button type="button" class="tag-selector-btn" onclick="todoApp.openTagSelector()">
                            <i class="fas fa-tags"></i> 选择标签
                        </button>
                        <button type="submit" id="add-btn">
                            <i class="fas fa-plus"></i> 添加任务
                        </button>
                    </div>
                </form>
            </div>

            <!-- 筛选和排序 -->
            <div class="filter-panel">
                <div class="filter-header" onclick="todoApp.toggleFilterPanel()">
                    <h3><i class="fas fa-filter"></i> 筛选选项</h3>
                    <i class="fas fa-chevron-down filter-toggle-icon"></i>
                </div>
                <div class="filter-content" id="filter-content">
                    <div class="filter-group">
                        <label>状态</label>
                        <select id="status-filter">
                            <option value="all">全部</option>
                            <option value="Pending">待处理</option>
                            <option value="InProgress">进行中</option>
                            <option value="Completed">已完成</option>
                        </select>
                    </div>
                    <div class="filter-group">
                        <label>优先级</label>
                        <select id="priority-filter">
                            <option value="all">全部</option>
                            <option value="High">高优先级</option>
                            <option value="Medium">中优先级</option>
                            <option value="Low">低优先级</option>
                        </select>
                    </div>
                    <div class="filter-group">
                        <label>分类</label>
                        <select id="category-filter">
                            <option value="all">全部分类</option>
                        </select>
                    </div>
                    <div class="filter-group filter-search">
                        <label>搜索</label>
                        <input type="search" id="search-input" class="search-input">
                    </div>
                </div>
            </div>

            <!-- 记录列表 -->
            <div class="scrolls-container">
                <div class="scroll-header">
                    <h2 class="scroll-title">
                        <i class="fas fa-scroll"></i> 任务卷轴
                    </h2>
                </div>
                <div class="scroll-content-wrapper">
                    <div class="todo-list" id="todo-list">
                        <!-- 待办事项将在这里动态生成 -->
                    </div>
                    <div class="loading" id="loading" style="display: none;">
                        <i class="fas fa-spinner fa-spin"></i> 加载中...
                    </div>
                </div>
                
                <!-- 底部批量操作栏 -->
                <div class="scroll-footer">
                    <div class="scroll-actions">
                        <button class="select-all-btn" onclick="todoApp.toggleSelectAll()" title="全选/取消全选">
                            <i class="fas fa-check-double"></i> 全选
                        </button>
                        <button class="batch-complete-btn" onclick="todoApp.batchComplete()" title="批量标记完成" style="display: none;">
                            <i class="fas fa-check-circle"></i> 标记完成
                        </button>
                        <button class="batch-delete-btn" onclick="todoApp.batchDelete()" title="批量删除" style="display: none;">
                            <i class="fas fa-trash"></i> 删除选中
                        </button>
                    </div>
                </div>
            </div>

            <!-- 统计信息 -->
            <div class="stats">
                <div class="stat-item stat-total">
                    <span class="stat-label">总计</span>
                    <span class="stat-value" id="total-count">0</span>
                </div>
                <div class="stat-item stat-pending">
                    <span class="stat-label">待处理</span>
                    <span class="stat-value" id="pending-count">0</span>
                </div>
                <div class="stat-item stat-progress">
                    <span class="stat-label">进行中</span>
                    <span class="stat-value" id="progress-count">0</span>
                </div>
                <div class="stat-item stat-completed">
                    <span class="stat-label">已完成</span>
                    <span class="stat-value" id="completed-count">0</span>
                </div>
            </div>
            
            <!-- 移除这里的导出选项面板 -->
        </div>

        <!-- 标签管理页面 -->
        <div id="page-tags" class="scroll-page">
            <div class="manager-content">
                <div class="create-form">
                    <input type="text" id="new-tag-name" placeholder="标签名称" maxlength="20">
                    <input type="color" id="new-tag-color" value="#3b82f6">
                    <button onclick="todoApp.createTag()">
                        <i class="fas fa-plus"></i> 创建标签
                    </button>
                </div>
                <div class="manager-list-wrapper">
                    <div id="tag-list" class="tag-list"></div>
                </div>
            </div>
        </div>

        <!-- 分类管理页面 -->
        <div id="page-categories" class="scroll-page">
            <div class="manager-content">
                <div class="create-form category-form">
                    <input type="text" id="new-category-name" placeholder="分类名称" maxlength="30">
                    <input type="text" id="new-category-desc" placeholder="分类描述（可选）">
                    <input type="color" id="new-category-color" value="#10b981">
                    <button type="button" class="category-tag-selector-btn" onclick="todoApp.openCategoryTagSelector()">
                        <i class="fas fa-tags"></i> 选择标签
                    </button>
                    <button onclick="todoApp.createCategory()">
                        <i class="fas fa-plus"></i> 创建分类
                    </button>
                </div>
                <div id="selected-category-tags" class="selected-tags" style="margin: 10px 0;"></div>
                <div class="manager-list-wrapper">
                    <div id="category-list" class="category-list"></div>
                </div>
            </div>
        </div>

        <!-- 导出选项页面 - 新增 -->
        <div id="page-export" class="scroll-page">
            <div class="export-page-header">
                <h2><i class="fas fa-download"></i> 导出选项</h2>
                <p class="page-description">选择导出方式，生成 Markdown 格式的任务报告</p>
            </div>
            
            <div class="export-options">
                <!-- 全部导出 -->
                <div class="export-option-card">
                    <div class="export-option-icon">📦</div>
                    <div class="export-option-content">
                        <h4>导出全部任务</h4>
                        <p>导出所有任务、标签和分类的完整数据</p>
                        <button class="export-btn-primary" onclick="todoApp.exportToMarkdown()">
                            <i class="fas fa-download"></i> 导出全部
                        </button>
                    </div>
                </div>
                
                <!-- 按周导出 -->
                <div class="export-option-card">
                    <div class="export-option-icon">📅</div>
                    <div class="export-option-content">
                        <h4>按周导出</h4>
                        <p>选择特定周的任务，生成周报</p>
                        <div class="week-selector">
                            <input type="week" id="week-select" class="week-input">
                            <button class="export-btn-primary" onclick="todoApp.exportByWeek()">
                                <i class="fas fa-calendar-week"></i> 导出周报
                            </button>
                        </div>
                    </div>
                </div>
                
                <!-- 按日期范围导出 -->
                <div class="export-option-card">
                    <div class="export-option-icon">📊</div>
                    <div class="export-option-content">
                        <h4>自定义范围</h4>
                        <p>选择日期范围，生成自定义报告</p>
                        <div class="date-range-selector">
                            <div class="date-inputs">
                                <input type="date" id="export-start-date" class="date-input-small" placeholder="开始日期">
                                <span class="date-separator">至</span>
                                <input type="date" id="export-end-date" class="date-input-small" placeholder="结束日期">
                            </div>
                            <button class="export-btn-primary" onclick="todoApp.exportByDateRange()">
                                <i class="fas fa-calendar-alt"></i> 导出范围
                            </button>
                        </div>
                    </div>
                </div>
                
                <!-- 快速导出选项 -->
                <div class="export-option-card quick-export">
                    <div class="export-option-icon">⚡</div>
                    <div class="export-option-content">
                        <h4>快速导出</h4>
                        <p>一键导出常用时间范围</p>
                        <div class="quick-export-buttons">
                            <button class="quick-export-btn" onclick="todoApp.exportToday()">
                                <i class="fas fa-calendar-day"></i> 今日
                            </button>
                            <button class="quick-export-btn" onclick="todoApp.exportThisWeek()">
                                <i class="fas fa-calendar-week"></i> 本周
                            </button>
                            <button class="quick-export-btn" onclick="todoApp.exportThisMonth()">
                                <i class="fas fa-calendar"></i> 本月
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 标签选择器弹窗 -->
    <div id="tag-selector-modal" class="modal" style="display: none;">
        <div class="modal-content">
            <div class="modal-header">
                <h3><i class="fas fa-tags"></i> 选择标签</h3>
                <button class="close-btn">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="modal-body">
                <div id="tag-selector-list" class="tag-selector-list"></div>
            </div>
            <div class="modal-footer">
                <button id="save-category-tags-btn" class="btn-primary" style="display: none;">
                    <i class="fas fa-save"></i> 保存
                </button>
                <button class="btn-secondary">确定</button>
            </div>
        </div>
    </div>

    <!-- Tauri v2 API 初始化脚本 -->
    <script>
      (function() {
        console.log('初始化 Tauri API...');
        
        // 确保 __TAURI__ 对象存在
        if (!window.__TAURI__) {
          window.__TAURI__ = {};
        }
        
        // 创建 invoke 方法包装器
        window.__TAURI__.invoke = async function(cmd, args = {}) {
          console.log(`调用命令: ${cmd}`, args);
          
          try {
            // Tauri v2 使用 __TAURI_INTERNALS__
            if (window.__TAURI_INTERNALS__ && window.__TAURI_INTERNALS__.invoke) {
              const result = await window.__TAURI_INTERNALS__.invoke(cmd, args);
              console.log(`命令 ${cmd} 成功:`, result);
              return result;
            }
            // 如果有 core.invoke
            else if (window.__TAURI__.core && window.__TAURI__.core.invoke) {
              const result = await window.__TAURI__.core.invoke(cmd, args);
              console.log(`命令 ${cmd} 成功:`, result);
              return result;
            }
            // 尝试直接使用 ipc
            else if (window.__TAURI_IPC__) {
              const result = await window.__TAURI_IPC__.invoke(cmd, args);
              console.log(`命令 ${cmd} 成功:`, result);
              return result;
            }
            else {
              throw new Error('Tauri API 不可用 - 找不到 invoke 方法');
            }
          } catch (error) {
            console.error(`调用 ${cmd} 失败:`, error);
            throw error;
          }
        };
        
        // 等待并加载 Tauri Dialog API
        const loadDialogAPI = async () => {
          try {
            // 等待 Tauri core 加载
            await new Promise(resolve => setTimeout(resolve, 100));
            
            // 尝试加载 dialog 模块
            if (window.__TAURI_INTERNALS__) {
              // Tauri v2 方式
              const { confirm } = window.__TAURI_INTERNALS__.dialog || {};
              if (confirm) {
                window.__TAURI__.dialog = { confirm };
                console.log('✅ Dialog API 已从 __TAURI_INTERNALS__ 加载');
                return;
              }
            }
            
            // 创建 dialog API 包装器（使用 invoke）
            window.__TAURI__.dialog = {
              confirm: async function(message, options = {}) {
                console.log('调用 dialog.confirm (invoke):', message, options);
                try {
                  const result = await window.__TAURI__.invoke('plugin:dialog|confirm', {
                    message: message,
                    title: options.title || '确认'
                  });
                  console.log('dialog.confirm 结果:', result);
                  return result;
                } catch (error) {
                  console.error('dialog.confirm 失败:', error);
                  throw error;
                }
              }
            };
            console.log('✅ Dialog API 已创建 (invoke wrapper)');
          } catch (error) {
            console.error('加载 Dialog API 失败:', error);
          }
        };
        
        loadDialogAPI();
        
        console.log('✅ Tauri API wrapper 已初始化');
        console.log('可用的 Tauri 对象:', {
          __TAURI__: !!window.__TAURI__,
          __TAURI_INTERNALS__: !!window.__TAURI_INTERNALS__,
          __TAURI_IPC__: !!window.__TAURI_IPC__,
          dialog: !!window.__TAURI__.dialog
        });
      })();
    </script>
    <script src="script.js"></script>
</body>
</html>
